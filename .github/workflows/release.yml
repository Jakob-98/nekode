name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-15
    strategy:
      matrix:
        include:
          - arch: arm64
          - arch: x86_64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build and bundle
        run: ./scripts/bundle-macos.sh --arch ${{ matrix.arch }}

      - name: Sign and notarize
        id: sign
        if: env.APPLE_IDENTITY != ''
        env:
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Import certificate from secrets
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

          ./scripts/sign-and-notarize.sh dist/Nekode.app

          # Re-create the zip with signed app
          rm -f dist/nekode-macOS.zip
          cd dist && ditto -c -k --sequesterRsrc --keepParent Nekode.app nekode-macOS.zip

          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Clean up signing keychain
        if: always() && steps.sign.outcome != 'skipped'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Rename zip for release
        run: mv dist/nekode-macOS.zip dist/nekode-macOS-${{ matrix.arch }}.zip

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: ./scripts/create-dmg.sh --arch ${{ matrix.arch }}

      - name: Upload zip artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nekode-macOS-${{ matrix.arch }}
          path: dist/nekode-macOS-${{ matrix.arch }}.zip

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nekode-macOS-${{ matrix.arch }}-dmg
          path: dist/nekode-macOS-${{ matrix.arch }}.dmg

  release:
    name: Create Release
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Build release body
        run: |
          TAG="${{ github.ref_name }}"
          cat > "$RUNNER_TEMP/release-body.md" << BODY
          <details>
          <summary>Installation</summary>

          ### Homebrew
          \`\`\`bash
          brew tap Jakob-98/nekode
          brew install --cask nekode
          \`\`\`

          ### macOS (Apple Silicon)
          \`\`\`bash
          curl -sL https://github.com/Jakob-98/nekode/releases/download/${TAG}/nekode-macOS-arm64.zip -o nekode.zip
          unzip nekode.zip
          mv Nekode.app /Applications/
          open /Applications/Nekode.app
          \`\`\`

          ### macOS (Intel)
          \`\`\`bash
          curl -sL https://github.com/Jakob-98/nekode/releases/download/${TAG}/nekode-macOS-x86_64.zip -o nekode.zip
          unzip nekode.zip
          mv Nekode.app /Applications/
          open /Applications/Nekode.app
          \`\`\`

          ### From source
          Requires Xcode 16+.
          \`\`\`bash
          git clone https://github.com/Jakob-98/nekode && cd nekode
          ./scripts/bundle-macos.sh
          cp -R dist/Nekode.app /Applications/
          \`\`\`

          > This release is signed and notarized with Apple Developer ID.

          </details>
          BODY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/nekode-macOS-arm64/nekode-macOS-arm64.zip
            artifacts/nekode-macOS-x86_64/nekode-macOS-x86_64.zip
            artifacts/nekode-macOS-arm64-dmg/nekode-macOS-arm64.dmg
            artifacts/nekode-macOS-x86_64-dmg/nekode-macOS-x86_64.dmg
          body_path: ${{ runner.temp }}/release-body.md

  update-appcast:
    name: Update Sparkle Appcast
    needs: release
    runs-on: macos-15
    steps:
      - name: Check for signing key
        env:
          KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::notice::SPARKLE_ED25519_PRIVATE_KEY not configured, skipping appcast update"
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Install Sparkle tools
        run: brew install sparkle

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate appcast
        env:
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          ./scripts/generate-appcast.sh \
            --version ${{ steps.version.outputs.version }} \
            artifacts/nekode-macOS-arm64/nekode-macOS-arm64.zip \
            artifacts/nekode-macOS-x86_64/nekode-macOS-x86_64.zip

      - name: Commit and push appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet && echo "No changes to appcast.xml" && exit 0
          git commit -m "Update appcast.xml for v${{ steps.version.outputs.version }}"
          git push origin main

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        env:
          TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::TAP_GITHUB_TOKEN not configured, skipping Homebrew update"
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Compute SHA256 hashes
        id: sha
        run: |
          ARM64_SHA=$(sha256sum artifacts/nekode-macOS-arm64/nekode-macOS-arm64.zip | awk '{print $1}')
          X86_64_SHA=$(sha256sum artifacts/nekode-macOS-x86_64/nekode-macOS-x86_64.zip | awk '{print $1}')
          echo "arm64=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_64=$X86_64_SHA" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp cask template
        run: |
          sed -i 's/version ".*"/version "${{ steps.version.outputs.version }}"/' packaging/homebrew-cask.rb
          sed -i 's/REPLACE_WITH_ARM64_SHA256/${{ steps.sha.outputs.arm64 }}/' packaging/homebrew-cask.rb
          sed -i 's/REPLACE_WITH_X86_64_SHA256/${{ steps.sha.outputs.x86_64 }}/' packaging/homebrew-cask.rb

      - name: Clone tap repo and update cask
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/Jakob-98/homebrew-nekode.git tap
          mkdir -p tap/Casks
          cp packaging/homebrew-cask.rb tap/Casks/nekode.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/nekode.rb
          git commit -m "Update nekode to ${{ steps.version.outputs.version }}"
          git push
